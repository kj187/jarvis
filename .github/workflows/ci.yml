name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pin-check:
    name: Action Pin Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
      - name: Install ratchet
        run: |
          go install github.com/sethvargo/ratchet@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Verify all Actions are SHA-pinned
        run: ratchet check .github/workflows/ci.yml .github/workflows/release.yml .github/workflows/codeql.yml

  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # ratchet:gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend:
    name: Backend
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # ratchet:actions/setup-go@v6.4.0
        with:
          go-version: '1.25.11'

      - name: Download dependencies
        run: go mod download

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@v2.1.0

      - name: Run tests
        run: |
          set -o pipefail
          go test -v -race -coverprofile=coverage.out ./... 2>&1 | go-junit-report -set-exit-code > report.xml

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage.out ]; then
            {
              echo "## Backend Coverage"
              echo '```'
              go tool cover -func=coverage.out
              echo '```'
            } >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # ratchet:dorny/test-reporter@v3
        if: always()
        with:
          name: Backend Test Results
          path: backend/report.xml
          reporter: java-junit

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # ratchet:actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: |
            backend/coverage.out
            backend/report.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # ratchet:codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage.out
          flags: backend
          fail_ci_if_error: false

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@v2.27.1
          gosec ./...

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          govulncheck ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # ratchet:golangci/golangci-lint-action@v9
        with:
          working-directory: backend
          version: v2.12.2

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # ratchet:actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

      - name: Run tests with coverage
        run: pnpm test:ci

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const s = require('./coverage/coverage-summary.json').total;
              const fmt = (v) => v.pct.toFixed(1) + '%';
              process.stdout.write([
                '## Frontend Coverage',
                '| Metric | Coverage |',
                '|--------|----------|',
                '| Statements | ' + fmt(s.statements) + ' |',
                '| Branches | ' + fmt(s.branches) + ' |',
                '| Functions | ' + fmt(s.functions) + ' |',
                '| Lines | ' + fmt(s.lines) + ' |',
                ''
              ].join('\n'));
            " >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # ratchet:dorny/test-reporter@v3
        if: always()
        with:
          name: Frontend Test Results
          path: frontend/test-results/junit.xml
          reporter: java-junit

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # ratchet:actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238 # ratchet:codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: frontend/coverage/
          flags: frontend
          fail_ci_if_error: false

      - name: Build
        run: pnpm build

      - name: Check code duplication
        run: pnpm duplication

  helm:
    name: Helm
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # ratchet:azure/setup-helm@v4
        with:
          version: v3.21.0

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v0.8.2

      - name: Lint chart
        run: helm lint charts/jarvis/

      - name: Run unit tests
        run: helm unittest charts/jarvis/
