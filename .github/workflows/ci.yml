name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  pin-check:
    name: Action Pin Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
      - name: Install ratchet
        run: |
          go install github.com/sethvargo/ratchet@v0.11.4
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Verify all Actions are SHA-pinned
        run: ratchet check .github/workflows/*.yml

  dco:
    name: DCO
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Check Signed-off-by on all commits
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          missing=$(git log --no-merges --format='%h %s' \
            --invert-grep --grep='^Signed-off-by: ' "${BASE_SHA}..${HEAD_SHA}")
          if [ -n "$missing" ]; then
            echo "Commits without Signed-off-by trailer (use 'git commit -s'):"
            echo "$missing"
            exit 1
          fi

  secrets:
    name: Secret Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # ratchet:gitleaks/gitleaks-action@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  backend:
    name: Backend
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: index.docker.io/library/postgres@sha256:4ffc96598f8965ee5b33b4186ab4f1ca4df7f4f0325f06d17c19d18e51d3f107 # ratchet:postgres:17
        env:
          POSTGRES_DB: jarvis
          POSTGRES_USER: jarvis
          POSTGRES_PASSWORD: jarvis
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # ratchet:actions/setup-go@v7.0.0
        with:
          go-version: '1.25.12'

      - name: Download dependencies
        run: go mod download

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@v2.1.0

      - name: Run tests
        env:
          JARVIS_TEST_POSTGRES_DSN: postgres://jarvis:jarvis@localhost:5432/jarvis?sslmode=disable
        run: |
          set -o pipefail
          go test -v -race -coverprofile=coverage.out ./... 2>&1 | go-junit-report -set-exit-code > report.xml

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage.out ]; then
            {
              echo "## Backend Coverage"
              echo '```'
              go tool cover -func=coverage.out
              echo '```'
            } >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload test results
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # ratchet:dorny/test-reporter@v3
        if: always()
        with:
          name: Backend Test Results
          path: backend/report.xml
          reporter: java-junit

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # ratchet:actions/upload-artifact@v7.0.1
        if: always()
        with:
          name: backend-coverage
          path: |
            backend/coverage.out
            backend/report.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # ratchet:codecov/codecov-action@v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage.out
          flags: backend
          fail_ci_if_error: false

      - name: Run govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.3.0
          govulncheck ./...

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # ratchet:golangci/golangci-lint-action@v9.3.0
        with:
          working-directory: backend
          version: v2.12.2

      - name: Run fuzz targets (short)
        run: |
          go test ./internal/db -run '^$' -fuzz '^FuzzRedactDSN$' -fuzztime 20s
          go test ./internal/history -run '^$' -fuzz '^FuzzParseNullableTimeString$' -fuzztime 20s
          go test ./internal/config -run '^$' -fuzz '^FuzzParseSecretKey$' -fuzztime 20s
          go test ./internal/api -run '^$' -fuzz '^FuzzValidateSilenceMatchers$' -fuzztime 20s
          go test ./internal/api -run '^$' -fuzz '^FuzzSanitizeAMMessage$' -fuzztime 20s

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # ratchet:pnpm/action-setup@v6.0.9
        with:
          version: 11.9.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # ratchet:actions/setup-node@v6.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

      - name: Lint
        run: pnpm lint

      - name: Unit tests (lib/alertUtils.ts, with coverage gate)
        run: pnpm test:unit:coverage

      - name: Build
        run: pnpm build

      - name: Check code duplication
        run: pnpm duplication

  helm:
    name: Helm
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # ratchet:azure/setup-helm@v5.0.1
        with:
          version: v3.21.0

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version v0.8.2

      - name: Lint chart
        run: helm lint charts/jarvis/

      - name: Run unit tests
        run: helm unittest charts/jarvis/
