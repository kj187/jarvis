name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
      id-token: write # required for keyless cosign signing via GitHub OIDC
      attestations: write # required for build provenance and SBOM attestations

    steps:
      # fetch-depth: 0 (full history + tags) so the pre-release notes step
      # below can diff against the last stable tag.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0
        with:
          fetch-depth: 0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # ratchet:docker/metadata-action@v6.2.0
        with:
          images: ghcr.io/kj187/jarvis
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # ratchet:docker/setup-qemu-action@v4.2.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # ratchet:docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # ratchet:docker/login-action@v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # ratchet:docker/build-push-action@v7
        with:
          context: .
          file: ./Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # ratchet:sigstore/cosign-installer@v4.1.2

      - name: Sign image with keyless signing (GitHub OIDC)
        run: |
          cosign sign --yes \
            ghcr.io/kj187/jarvis@${{ steps.build.outputs.digest }}

      # Publishes SLSA provenance to the GitHub attestations API so consumers
      # can run `gh attestation verify` (in addition to the BuildKit provenance
      # already embedded in the image manifest).
      - name: Attest build provenance (GitHub)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # ratchet:actions/attest-build-provenance@v4.1.1
        with:
          subject-name: ghcr.io/kj187/jarvis
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      # Standalone SPDX SBOM attached to the GitHub Release as an asset, so
      # users can inspect dependencies without pulling the image. syft is run
      # directly because the sbom-action wrapper no longer supports writing to
      # a workspace file (output-file/upload-* inputs were removed).
      - name: Install syft
        id: syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # ratchet:anchore/sbom-action/download-syft@v0.24.0

      - name: Generate SBOM (SPDX)
        run: |
          SYFT="${{ steps.syft.outputs.cmd }}"
          if [ -z "${SYFT}" ]; then SYFT=$(command -v syft); fi
          "${SYFT}" "ghcr.io/kj187/jarvis@${{ steps.build.outputs.digest }}" \
            -o spdx-json > sbom.spdx.json
          test -s sbom.spdx.json

      - name: Build release body
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIGEST="${{ steps.build.outputs.digest }}"
          CHART_VERSION=$(awk '/^version:/{print $2}' charts/jarvis/Chart.yaml)

          # Pre-releases (tag contains a hyphen, e.g. v1.7.0-rc.1) never get
          # curated notes or a CHANGELOG section — those are only generated
          # for real releases, so an RC leaves no trace in either once the
          # real release follows. Summarize commits since the last stable
          # tag instead.
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            PREV_STABLE=$(git tag --list 'v*' | grep -Ev -- '-' | sort -V | tail -1)
            {
              printf '## Pre-release build\n\n'
              printf 'Release candidate for the upcoming stable release. Not published as `latest`.\n\n'
              if [ -n "${PREV_STABLE}" ]; then
                printf '**Commits since %s:**\n\n' "${PREV_STABLE}"
                git log "${PREV_STABLE}..${GITHUB_REF_NAME}" --pretty='- %s (%h)'
              fi
            } > release-body.md
          else
            # Prefer curated release notes committed by the release process;
            # fall back to extracting this version's CHANGELOG section.
            NOTES_FILE=".github/release-notes/${GITHUB_REF_NAME}.md"
            if [ -f "${NOTES_FILE}" ]; then
              cp "${NOTES_FILE}" release-body.md
            else
              printf '## Changelog\n\n' > release-body.md
              awk "/^## \[${GITHUB_REF_NAME}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md >> release-body.md
            fi
          fi

          cat >> release-body.md <<'EOF'

          ---

          ## Container image

          ```shell
          docker pull ghcr.io/kj187/jarvis:@VERSION@
          ```

          Digest: `@DIGEST@`

          ### Verify image signature (cosign)

          ```shell
          cosign verify ghcr.io/kj187/jarvis@@DIGEST@ \
            --certificate-identity-regexp="https://github.com/kj187/jarvis/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com"
          ```

          ### Verify build provenance (GitHub attestation)

          ```shell
          gh attestation verify oci://ghcr.io/kj187/jarvis:@VERSION@ --repo kj187/jarvis
          ```

          ## Helm chart

          ```shell
          helm install jarvis oci://ghcr.io/kj187/charts/jarvis --version @CHART_VERSION@
          ```

          ### Verify chart signature (cosign)

          ```shell
          cosign verify ghcr.io/kj187/charts/jarvis:@CHART_VERSION@ \
            --certificate-identity-regexp="https://github.com/kj187/jarvis/.*" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com"
          ```

          ## SBOM

          The SPDX SBOM is attached to this release (`sbom.spdx.json`) and also
          embedded in the image manifest (`docker buildx imagetools inspect`).
          EOF

          sed -i "s|@VERSION@|${VERSION}|g; s|@DIGEST@|${DIGEST}|g; s|@CHART_VERSION@|${CHART_VERSION}|g" release-body.md
          cat release-body.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          # Releases are immutable: if one already exists for this tag, fail
          # instead of silently overwriting it (delete manually if intended).
          # Pre-release tags (contain a hyphen, e.g. v1.7.0-rc.1) are marked
          # --prerelease instead of --latest, so they never override the
          # "latest" pointer for the real release that follows.
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            STABILITY_FLAG="--prerelease"
          else
            STABILITY_FLAG="--latest"
          fi
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file release-body.md \
            --verify-tag \
            "${STABILITY_FLAG}" \
            sbom.spdx.json
