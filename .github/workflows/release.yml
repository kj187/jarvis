name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
      id-token: write # required for keyless cosign signing via GitHub OIDC
      attestations: write # required for build provenance and SBOM attestations

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # ratchet:actions/checkout@v6.0.3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # ratchet:docker/metadata-action@v6.1.0
        with:
          images: ghcr.io/kj187/jarvis
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # ratchet:docker/setup-qemu-action@v4.1.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # ratchet:docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # ratchet:docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # ratchet:docker/build-push-action@v7
        with:
          context: .
          file: ./Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # ratchet:sigstore/cosign-installer@v4.1.2

      - name: Sign image with keyless signing (GitHub OIDC)
        run: |
          cosign sign --yes \
            ghcr.io/kj187/jarvis@${{ steps.build.outputs.digest }}

      - name: Build release body
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIGEST="${{ steps.build.outputs.digest }}"
          printf '## Changelog\n\n' > release-body.md
          awk "/^## \[${GITHUB_REF_NAME}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md >> release-body.md
          printf '\n---\n\n' >> release-body.md
          printf '## Container Image\n\n```shell\n' >> release-body.md
          printf 'docker pull ghcr.io/kj187/jarvis:%s\n' "${VERSION}" >> release-body.md
          printf '```\n\n## Verify with Cosign\n\n```shell\n' >> release-body.md
          printf 'cosign verify ghcr.io/kj187/jarvis@%s \\\n' "${DIGEST}" >> release-body.md
          printf '  --certificate-identity-regexp="https://github.com/kj187/jarvis/.*" \\\n' >> release-body.md
          printf '  --certificate-oidc-issuer="https://token.actions.githubusercontent.com"\n' >> release-body.md
          printf '```\n' >> release-body.md
          cat release-body.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          # Releases are immutable: if one already exists for this tag, fail
          # instead of silently overwriting it (delete manually if intended).
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file release-body.md \
            --latest
