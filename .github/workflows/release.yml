name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
      id-token: write # required for keyless cosign signing via GitHub OIDC
      attestations: write # required for build provenance and SBOM attestations

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # ratchet:docker/metadata-action@v5
        with:
          images: ghcr.io/kj187/jarvis
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # ratchet:docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # ratchet:docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # ratchet:docker/build-push-action@v7
        with:
          context: .
          file: ./Containerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # ratchet:sigstore/cosign-installer@v4.1.2

      - name: Sign image with keyless signing (GitHub OIDC)
        run: |
          cosign sign --yes \
            ghcr.io/kj187/jarvis@${{ steps.build.outputs.digest }}

      - name: Build release body
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          DIGEST="${{ steps.build.outputs.digest }}"
          printf '## Getting Started\n\n' > release-body.md
          printf '**No clone needed — runs entirely from the published image.**\n' >> release-body.md
          printf 'All configuration options → [README → Configuration](https://github.com/kj187/jarvis#configuration)\n\n' >> release-body.md
          printf '### Local\n\n```shell\nmkdir jarvis && cd jarvis\n```\n\n' >> release-body.md
          printf 'Create a `compose.yml`:\n\n```yaml\nservices:\n  jarvis:\n    image: ghcr.io/kj187/jarvis:%s\n' "${VERSION}" >> release-body.md
          printf '    ports:\n      - "8080:8080"\n    volumes:\n      - jarvis_data:/data\n' >> release-body.md
          printf '    environment:\n      JARVIS_CLUSTER_1_NAME: production\n      JARVIS_CLUSTER_1_ALERTMANAGER_URL: http://alertmanager:9093\n' >> release-body.md
          printf '    restart: unless-stopped\n    read_only: true\n    tmpfs:\n      - /tmp\n' >> release-body.md
          printf '    security_opt:\n      - no-new-privileges:true\n    cap_drop:\n      - ALL\n\nvolumes:\n  jarvis_data:\n```\n\n' >> release-body.md
          printf '```bash\ndocker compose up -d\n# http://localhost:8080\n```\n\n' >> release-body.md
          printf '### Kubernetes\n\n#### Helm chart\n\n```bash\n' >> release-body.md
          printf 'helm install jarvis oci://ghcr.io/kj187/charts/jarvis \\\n' >> release-body.md
          printf '  --version %s \\\n' "${VERSION}" >> release-body.md
          printf '  --set clusters[0].name=production \\\n' >> release-body.md
          printf '  --set clusters[0].alertmanagerUrl=http://alertmanager:9093 \\\n' >> release-body.md
          printf '  --set persistence.enabled=true\n```\n\n---\n\n' >> release-body.md
          printf '## Container Image\n\n```shell\n' >> release-body.md
          printf 'docker pull ghcr.io/kj187/jarvis:%s\n' "${VERSION}" >> release-body.md
          printf '```\n\n## Verify with Cosign\n\n```shell\n' >> release-body.md
          printf 'cosign verify ghcr.io/kj187/jarvis@%s \\\n' "${DIGEST}" >> release-body.md
          printf '  --certificate-identity-regexp="https://github.com/kj187/jarvis/.*" \\\n' >> release-body.md
          printf '  --certificate-oidc-issuer="https://token.actions.githubusercontent.com"\n' >> release-body.md
          printf '```\n\n---\n\n' >> release-body.md
          awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md >> release-body.md
          cat release-body.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "${{ github.ref_name }}" --yes 2>/dev/null || true
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file release-body.md \
            --latest

  helm-publish:
    name: Helm Chart
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # ratchet:azure/setup-helm@v4

      - name: Patch Chart versions
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/^version:.*/version: ${VERSION}/" charts/jarvis/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${VERSION}\"/" charts/jarvis/Chart.yaml

      - name: Log in to GHCR (Helm)
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Package and push chart
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          helm package charts/jarvis --version "${VERSION}"
          helm push "jarvis-${VERSION}.tgz" oci://ghcr.io/kj187/charts
