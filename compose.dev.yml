services:
  backend:
    build:
      context: ./backend
      dockerfile: Containerfile.dev
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - ./data:/data
    env_file: .env
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install -g pnpm && pnpm install && pnpm dev --host"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    environment:
      - VITE_API_BASE=http://localhost:8080
