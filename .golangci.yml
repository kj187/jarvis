run:
  timeout: 5m

linters:
  enable:
    - gosec
    - errcheck
    - bodyclose
    - noctx
    - staticcheck
    - unused
    - govet
    - gofmt
    - misspell
    - dupl

linters-settings:
  gosec:
    severity: medium
    confidence: medium
  dupl:
    threshold: 100

issues:
  exclude-rules:
    - path: "_test.go"
      linters:
        - gosec
        - errcheck
    - path: "internal/history/store.go"
      linters:
        - gosec
      text: "G202"
