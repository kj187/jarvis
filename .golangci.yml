version: "2"

linters:
  enable:
    - gosec
    - errcheck
    - bodyclose
    - noctx
    - staticcheck
    - govet
    - misspell
    - dupl
  settings:
    gosec:
      severity: medium
      confidence: medium
    dupl:
      threshold: 100
  exclusions:
    rules:
      - path: "_test.go"
        linters:
          - gosec
          - errcheck
      - path: "internal/history/store.go"
        linters:
          - gosec
        text: "G202"
