run:
  timeout: 5m

linters:
  enable:
    - gosec
    - errcheck
    - bodyclose
    - noctx
    - staticcheck
    - unused
    - govet
    - gofmt
    - misspell

linters-settings:
  gosec:
    severity: medium
    confidence: medium

issues:
  exclude-rules:
    - path: "_test.go"
      linters:
        - gosec
        - errcheck
