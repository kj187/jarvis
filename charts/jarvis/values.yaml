replicaCount: 1

image:
  repository: ghcr.io/kj187/jarvis
  pullPolicy: IfNotPresent
  # Overrides the image tag. Defaults to the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

leaderElection:
  podLabel:
    # Labels the current leader pod jarvis.kj187.de/role=leader (D7 in
    # tmp/fable/multi-replica.md) — informational only, every pod serves all
    # traffic regardless of leadership. Requires a Role+RoleBinding (pods:
    # get, patch) and automountServiceAccountToken: true on the pod, both
    # rendered only while this is true. Meaningful only with PostgreSQL
    # (JARVIS_DB_DSN starting postgres://) and replicaCount/HPA > 1 — safe to
    # leave on with SQLite or a single replica, it just labels the one pod.
    enabled: true

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  # distroless/static-debian12 nonroot UID
  runAsUser: 65532
  runAsGroup: 65532
  fsGroup: 65532

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

service:
  type: ClusterIP
  port: 80

# Prometheus metrics. The /metrics endpoint itself is always exposed by the
# app (public, like /health) — this section only controls how a Prometheus
# instance discovers and scrapes it.
metrics:
  serviceMonitor:
    # Requires the Prometheus Operator CRDs (monitoring.coreos.com/v1) in the cluster.
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}
  # Alternative to serviceMonitor for annotation-based scraping setups.
  podAnnotations: false

ingress:
  enabled: false
  className: ""
  # WebSocket support — required for live alert updates.
  #
  # ingress-nginx:
  #   nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
  #   nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
  #   nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
  #   nginx.ingress.kubernetes.io/configuration-snippet: |
  #     proxy_set_header Upgrade $http_upgrade;
  #     proxy_set_header Connection "upgrade";
  #
  # Traefik (v2/v3): WebSocket is supported out of the box — no annotations needed.
  # Use a Middleware for HTTPS redirect or headers if required:
  #   traefik.ingress.kubernetes.io/router.entrypoints: websecure
  #   traefik.ingress.kubernetes.io/router.tls: "true"
  annotations: {}
  hosts:
    - host: jarvis.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: jarvis-tls
  #    hosts:
  #      - jarvis.example.com

resources: {}
  # limits:
  #   cpu: 200m
  #   memory: 128Mi
  # requests:
  #   cpu: 50m
  #   memory: 64Mi

config:
  logLevel: info
  pollInterval: 15s
  runbookBaseURL: ""
  # Comma-separated list of allowed browser origins for CORS and WebSocket.
  # Required when the browser-visible hostname differs from the backend host
  # (e.g. when accessed via an ingress). Example: "https://jarvis.example.com"
  # Leave empty for same-origin-only access.
  allowedOrigins: ""

# Alertmanager cluster configuration.
# At least one cluster is required. Add additional clusters by appending entries.
clusters:
  - name: default
    alertmanagerUrl: http://alertmanager:9093
    # Optional Prometheus URL for rule lookups
    prometheusUrl: ""
    # Optional: overrides host/scheme for browser links when the internal URL
    # differs from what the browser can reach (e.g. via ingress).
    hostAlias: ""

# User authentication configuration (UI login).
# See docs/authentication-user.md for the full reference.
auth:
  # Authentication provider: none | internal | oidc
  # none:     no login required; all write actions are publicly accessible (default)
  # internal: local user accounts managed via the built-in admin panel
  # oidc:     delegate login to an external OIDC provider (Keycloak, Authentik, Dex, etc.)
  provider: none
  # Protection level when provider is "internal" or "oidc" (ignored when provider=none).
  # write_protect (default): unauthenticated users can view alerts read-only; write
  #                           operations (claims, comments, silences) require login.
  # full_protect:             all routes require login; unauthenticated users see only
  #                           the login page.
  mode: ""
  # Secret key for signing session tokens (min 32 random bytes in hex or base64).
  # Required when provider is "internal" or "oidc".
  # Use auth.existingSecret in production to avoid storing the key in values.
  secretKey: ""
  # Use an existing Kubernetes Secret for auth credentials.
  # The Secret must contain the keys referenced by auth.existingSecretKeys.
  existingSecret: ""
  existingSecretKeys:
    secretKey: secret-key
    oidcClientSecret: oidc-client-secret
  oidc:
    # OIDC issuer URL (e.g. https://keycloak.example.com/realms/myrealm)
    issuer: ""
    clientId: ""
    # Client secret — stored in the auth Secret, never in the ConfigMap.
    clientSecret: ""
    # Redirect URL — must match the configuration in the OIDC provider.
    # Example: https://jarvis.example.com/auth/oidc/callback
    redirectUrl: ""
    scopes: "openid,profile,email"

# Database configuration.
database:
  # DSN for the database connection. Two dialects are supported:
  #   SQLite (default):  a file path, e.g. /data/jarvis.db
  #   PostgreSQL:        a postgres:// URL, e.g. postgres://user:pass@host:5432/db?sslmode=require
  #                      Use sslmode=require or verify-full in production. sslmode=disable
  #                      transmits credentials in plain text.
  # The dialect is detected automatically from the DSN prefix.
  # The DSN is stored in a Kubernetes Secret and never logged in plain text.
  dsn: /data/jarvis.db
  # Use an existing Secret instead of letting the chart create one.
  # When set, `dsn` above is ignored.
  existingSecret: ""
  existingSecretKey: dsn

# Persistent storage for the SQLite database file.
# Ignored when using PostgreSQL (database.dsn starts with "postgres://").
persistence:
  enabled: false
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
  annotations: {}

# Deployment update strategy.
# When empty, auto-selects: Recreate if persistence.enabled (RWO volumes like EBS cannot be
# mounted by two pods simultaneously — rolling updates cause forced detachment and disk I/O errors),
# RollingUpdate otherwise. Override explicitly when needed (e.g. RollingUpdate for PostgreSQL).
updateStrategy:
  type: ""

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

nodeSelector: {}
tolerations: []
affinity: {}

# Additional environment variables injected into the container.
# Useful for passing token paths, feature flags, or provider-specific config.
extraEnv: []
# - name: VAULT_TOKEN_FILE
#   value: /var/run/secrets/workload/token

# Additional volumes attached to the Pod.
extraVolumes: []
# - name: my-config
#   configMap:
#     name: my-config

# Additional volume mounts added to the container.
extraVolumeMounts: []
# - name: my-config
#   mountPath: /etc/my-config
#   readOnly: true

# Projected ServiceAccount token — convenience helper for Vault JWT auth and
# similar OIDC/JWT workload-identity flows.  Works independently of
# automountServiceAccountToken: the projected volume is always mounted
# explicitly, so automount can safely be disabled at the pod level.
serviceAccountTokenProjection:
  enabled: false
  # Name used for both the Volume and the VolumeMount.
  volumeName: workload-token
  # Mount path inside the container.
  mountPath: /var/run/secrets/workload
  # File name of the token inside mountPath.
  tokenFileName: token
  # Audience for the token (e.g. "vault"). Leave empty for the default Kubernetes audience.
  audience: ""
  # Token lifetime in seconds. Kubernetes rotates the token automatically before expiry.
  expirationSeconds: 3600
