suite: deployment
templates:
  - templates/deployment.yaml

tests:
  - it: renders one Deployment by default
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Deployment

  - it: uses chart appVersion as image tag by default
    chart:
      appVersion: 9.9.9-test
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/kj187/jarvis:9.9.9-test

  - it: uses custom image tag when set
    set:
      image.tag: v1.2.3
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/kj187/jarvis:v1.2.3

  - it: exposes container port 8080
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080

  - it: reads JARVIS_DB_DSN from chart-created secret by default
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0].name
          value: JARVIS_DB_DSN
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.key
          value: dsn

  - it: reads JARVIS_DB_DSN from existing secret when configured
    set:
      database.existingSecret: my-secret
      database.existingSecretKey: database-url
    asserts:
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.name
          value: my-secret
      - equal:
          path: spec.template.spec.containers[0].env[0].valueFrom.secretKeyRef.key
          value: database-url

  - it: mounts emptyDir at /data when persistence disabled
    asserts:
      - equal:
          path: spec.template.spec.volumes[0].emptyDir
          value: {}
      - equal:
          path: spec.template.spec.containers[0].volumeMounts[0].mountPath
          value: /data

  - it: mounts PVC at /data when persistence enabled
    set:
      persistence.enabled: true
    asserts:
      - isNotNullOrEmpty:
          path: spec.template.spec.volumes[0].persistentVolumeClaim.claimName

  - it: fails when persistence enabled with SQLite and replicaCount > 1
    set:
      persistence.enabled: true
      replicaCount: 2
    asserts:
      - failedTemplate:
          errorMessage: "Invalid configuration: persistence.enabled=true with SQLite requires replicaCount=1. RWO volumes (e.g. EBS) support only one node mount and SQLite is single-writer. Use PostgreSQL (database.dsn=postgres://...) for multi-replica deployments."

  - it: fails when persistence enabled with SQLite and autoscaling enabled
    set:
      persistence.enabled: true
      autoscaling.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "Invalid configuration: persistence.enabled=true with SQLite is incompatible with autoscaling. HPA may schedule multiple pods which cannot share a RWO volume or SQLite. Use PostgreSQL (database.dsn=postgres://...) for scalable deployments."

  - it: allows replicaCount > 1 when persistence disabled
    set:
      replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: defaults to RollingUpdate strategy when persistence disabled
    asserts:
      - equal:
          path: spec.strategy.type
          value: RollingUpdate

  - it: defaults to Recreate strategy when persistence enabled
    set:
      persistence.enabled: true
    asserts:
      - equal:
          path: spec.strategy.type
          value: Recreate

  - it: respects explicit updateStrategy override
    set:
      persistence.enabled: true
      updateStrategy.type: RollingUpdate
    asserts:
      - equal:
          path: spec.strategy.type
          value: RollingUpdate

  - it: does not manage replica count when autoscaling enabled
    set:
      autoscaling.enabled: true
    asserts:
      - notExists:
          path: spec.replicas

  - it: sets replica count when autoscaling disabled
    set:
      replicaCount: 3
    asserts:
      - equal:
          path: spec.replicas
          value: 3

  - it: applies readOnlyRootFilesystem security context
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true

  - it: runs as non-root
    asserts:
      - equal:
          path: spec.template.spec.securityContext.runAsNonRoot
          value: true

  - it: does not add JARVIS_SECRET_KEY env when auth.provider is none
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: JARVIS_SECRET_KEY

  - it: adds JARVIS_SECRET_KEY from chart secret when auth.provider is internal
    set:
      auth.provider: internal
      auth.secretKey: "deadbeef"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: JARVIS_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: RELEASE-NAME-jarvis
                key: secret-key

  - it: adds JARVIS_SECRET_KEY from existingSecret when auth.existingSecret is set
    set:
      auth.provider: internal
      auth.existingSecret: jarvis-auth
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: JARVIS_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: jarvis-auth
                key: secret-key

  - it: adds JARVIS_AUTH_OIDC_CLIENT_SECRET when auth.provider is oidc
    set:
      auth.provider: oidc
      auth.existingSecret: jarvis-auth
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: JARVIS_AUTH_OIDC_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                name: jarvis-auth
                key: oidc-client-secret

  - it: does not add JARVIS_AUTH_OIDC_CLIENT_SECRET when auth.provider is internal
    set:
      auth.provider: internal
      auth.existingSecret: jarvis-auth
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: JARVIS_AUTH_OIDC_CLIENT_SECRET

  - it: appends extraEnv entries to container env
    set:
      extraEnv:
        - name: VAULT_TOKEN_FILE
          value: /var/run/secrets/workload/token
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: VAULT_TOKEN_FILE
            value: /var/run/secrets/workload/token

  - it: does not add extra env vars when extraEnv is empty
    asserts:
      - notContains:
          path: spec.template.spec.containers[0].env
          content:
            name: VAULT_TOKEN_FILE

  - it: appends extraVolumeMounts to container
    set:
      extraVolumeMounts:
        - name: my-secret
          mountPath: /etc/my-secret
          readOnly: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: my-secret
            mountPath: /etc/my-secret
            readOnly: true

  - it: does not add extra volume mounts when extraVolumeMounts is empty
    asserts:
      - equal:
          path: spec.template.spec.containers[0].volumeMounts
          value:
            - name: data
              mountPath: /data

  - it: appends extraVolumes to pod spec
    set:
      extraVolumes:
        - name: my-secret
          secret:
            secretName: my-secret
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: my-secret
            secret:
              secretName: my-secret

  - it: does not add projected token volume when serviceAccountTokenProjection is disabled
    asserts:
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: workload-token
      - equal:
          path: spec.template.spec.containers[0].volumeMounts
          value:
            - name: data
              mountPath: /data

  - it: adds projected token volume and mount when serviceAccountTokenProjection is enabled
    set:
      serviceAccountTokenProjection.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: workload-token
            projected:
              sources:
                - serviceAccountToken:
                    path: token
                    expirationSeconds: 3600
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: workload-token
            mountPath: /var/run/secrets/workload
            readOnly: true

  - it: sets audience on projected token when configured
    set:
      serviceAccountTokenProjection.enabled: true
      serviceAccountTokenProjection.audience: vault
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: workload-token
            projected:
              sources:
                - serviceAccountToken:
                    path: token
                    expirationSeconds: 3600
                    audience: vault

  - it: renders no pod annotations by default
    asserts:
      - notExists:
          path: spec.template.metadata.annotations

  - it: renders prometheus.io annotations when metrics.podAnnotations is enabled
    set:
      metrics.podAnnotations: true
    asserts:
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/port"]
          value: "8080"
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/path"]
          value: /metrics

  - it: merges user podAnnotations with prometheus.io annotations
    set:
      metrics.podAnnotations: true
      podAnnotations:
        team: sre
    asserts:
      - equal:
          path: spec.template.metadata.annotations["team"]
          value: sre
      - equal:
          path: spec.template.metadata.annotations["prometheus.io/scrape"]
          value: "true"

  - it: respects custom volumeName and mountPath for projected token
    set:
      serviceAccountTokenProjection.enabled: true
      serviceAccountTokenProjection.volumeName: vault-token
      serviceAccountTokenProjection.mountPath: /vault/secrets
      serviceAccountTokenProjection.tokenFileName: jwt
      serviceAccountTokenProjection.expirationSeconds: 7200
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: vault-token
            projected:
              sources:
                - serviceAccountToken:
                    path: jwt
                    expirationSeconds: 7200
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: vault-token
            mountPath: /vault/secrets
            readOnly: true
