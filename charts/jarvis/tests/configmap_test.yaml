suite: configmap
templates:
  - templates/configmap.yaml

tests:
  - it: renders one ConfigMap
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: ConfigMap

  - it: sets JARVIS_PORT to 8080
    asserts:
      - equal:
          path: data.JARVIS_PORT
          value: "8080"

  - it: sets log level from config.logLevel
    set:
      config.logLevel: debug
    asserts:
      - equal:
          path: data.JARVIS_LOG_LEVEL
          value: debug

  - it: sets poll interval from config.pollInterval
    set:
      config.pollInterval: 30s
    asserts:
      - equal:
          path: data.JARVIS_POLL_INTERVAL
          value: 30s

  - it: sets JARVIS_DB_MAX_OPEN_CONNS to 10 by default
    asserts:
      - equal:
          path: data.JARVIS_DB_MAX_OPEN_CONNS
          value: "10"

  - it: sets JARVIS_DB_MAX_OPEN_CONNS from database.maxOpenConns
    set:
      database.maxOpenConns: 25
    asserts:
      - equal:
          path: data.JARVIS_DB_MAX_OPEN_CONNS
          value: "25"

  - it: includes JARVIS_RUNBOOK_BASE_URL when set
    set:
      config.runbookBaseURL: https://wiki.example.com/runbooks/
    asserts:
      - equal:
          path: data.JARVIS_RUNBOOK_BASE_URL
          value: https://wiki.example.com/runbooks/

  - it: omits JARVIS_RUNBOOK_BASE_URL when empty
    asserts:
      - notExists:
          path: data.JARVIS_RUNBOOK_BASE_URL

  - it: includes JARVIS_ALLOWED_ORIGINS when set
    set:
      config.allowedOrigins: https://jarvis.example.com
    asserts:
      - equal:
          path: data.JARVIS_ALLOWED_ORIGINS
          value: https://jarvis.example.com

  - it: omits JARVIS_ALLOWED_ORIGINS when empty
    asserts:
      - notExists:
          path: data.JARVIS_ALLOWED_ORIGINS

  - it: sets JARVIS_AUTH_PROVIDER to none by default
    asserts:
      - equal:
          path: data.JARVIS_AUTH_PROVIDER
          value: none

  - it: sets JARVIS_AUTH_PROVIDER from auth.provider
    set:
      auth.provider: internal
    asserts:
      - equal:
          path: data.JARVIS_AUTH_PROVIDER
          value: internal

  - it: includes OIDC config when auth.oidc.issuer is set
    set:
      auth.provider: oidc
      auth.oidc.issuer: https://keycloak.example.com/realms/myrealm
      auth.oidc.clientId: jarvis
      auth.oidc.redirectUrl: https://jarvis.example.com/auth/oidc/callback
      auth.oidc.scopes: openid,profile,email
    asserts:
      - equal:
          path: data.JARVIS_AUTH_OIDC_ISSUER
          value: https://keycloak.example.com/realms/myrealm
      - equal:
          path: data.JARVIS_AUTH_OIDC_CLIENT_ID
          value: jarvis
      - equal:
          path: data.JARVIS_AUTH_OIDC_REDIRECT_URL
          value: https://jarvis.example.com/auth/oidc/callback
      - equal:
          path: data.JARVIS_AUTH_OIDC_SCOPES
          value: openid,profile,email

  - it: omits OIDC config when auth.oidc.issuer is empty
    asserts:
      - notExists:
          path: data.JARVIS_AUTH_OIDC_ISSUER
      - notExists:
          path: data.JARVIS_AUTH_OIDC_CLIENT_ID

  - it: generates JARVIS_CLUSTER_1_* for default cluster
    asserts:
      - equal:
          path: data.JARVIS_CLUSTER_1_NAME
          value: default
      - equal:
          path: data.JARVIS_CLUSTER_1_ALERTMANAGER_URL
          value: http://alertmanager:9093

  - it: omits optional cluster fields when not set
    asserts:
      - notExists:
          path: data.JARVIS_CLUSTER_1_PROMETHEUS_URL
      - notExists:
          path: data.JARVIS_CLUSTER_1_HOST_ALIAS

  - it: generates JARVIS_CLUSTER_2_* for second cluster
    values:
      - ./values/two-clusters.yaml
    asserts:
      - equal:
          path: data.JARVIS_CLUSTER_1_NAME
          value: staging
      - equal:
          path: data.JARVIS_CLUSTER_1_ALERTMANAGER_URL
          value: http://am-staging:9093
      - equal:
          path: data.JARVIS_CLUSTER_1_PROMETHEUS_URL
          value: http://prom-staging:9090
      - equal:
          path: data.JARVIS_CLUSTER_2_NAME
          value: production
      - equal:
          path: data.JARVIS_CLUSTER_2_ALERTMANAGER_URL
          value: http://am-prod:9093
      - equal:
          path: data.JARVIS_CLUSTER_2_HOST_ALIAS
          value: https://alertmanager.example.com
