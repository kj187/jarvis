suite: secret
templates:
  - templates/secret.yaml

tests:
  - it: creates Secret when no existingSecret configured
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret

  - it: stores DSN value in secret
    set:
      database.dsn: /data/jarvis.db
    asserts:
      - equal:
          path: stringData.dsn
          value: /data/jarvis.db

  - it: stores PostgreSQL DSN in secret
    set:
      database.dsn: postgres://jarvis:secret@postgres:5432/jarvis?sslmode=disable
    asserts:
      - equal:
          path: stringData.dsn
          value: postgres://jarvis:secret@postgres:5432/jarvis?sslmode=disable

  - it: does not create Secret when existingSecret is set
    set:
      database.existingSecret: my-db-secret
    asserts:
      - hasDocuments:
          count: 0
