suite: secret
templates:
  - templates/secret.yaml

tests:
  - it: creates Secret when no existingSecret configured
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Secret

  - it: stores DSN value in secret
    set:
      database.dsn: /data/jarvis.db
    asserts:
      - equal:
          path: stringData.dsn
          value: /data/jarvis.db

  - it: stores PostgreSQL DSN in secret
    set:
      database.dsn: postgres://jarvis:secret@postgres:5432/jarvis?sslmode=disable
    asserts:
      - equal:
          path: stringData.dsn
          value: postgres://jarvis:secret@postgres:5432/jarvis?sslmode=disable

  - it: does not create Secret when existingSecret is set
    set:
      database.existingSecret: my-db-secret
    asserts:
      - hasDocuments:
          count: 0

  - it: stores secret-key when auth.provider is internal and auth.secretKey is set
    set:
      auth.provider: internal
      auth.secretKey: "deadbeefdeadbeefdeadbeefdeadbeef"
    asserts:
      - equal:
          path: stringData.secret-key
          value: deadbeefdeadbeefdeadbeefdeadbeef

  - it: omits secret-key when auth.provider is none
    asserts:
      - notExists:
          path: stringData.secret-key

  - it: stores oidc-client-secret when provider is oidc and clientSecret is set
    set:
      auth.provider: oidc
      auth.secretKey: "deadbeefdeadbeefdeadbeefdeadbeef"
      auth.oidc.clientSecret: "my-oidc-secret"
    asserts:
      - equal:
          path: stringData.oidc-client-secret
          value: my-oidc-secret

  - it: omits oidc-client-secret when auth.existingSecret is set
    set:
      auth.provider: oidc
      auth.existingSecret: jarvis-auth
      auth.oidc.clientSecret: "my-oidc-secret"
    asserts:
      - notExists:
          path: stringData.oidc-client-secret
