{{- include "jarvis.validateReplicas" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jarvis.fullname" . }}
  labels:
    {{- include "jarvis.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  {{- $strategyType := .Values.updateStrategy.type }}
  {{- if not $strategyType }}
  {{-   if .Values.persistence.enabled }}
  {{-     $strategyType = "Recreate" }}
  {{-   else }}
  {{-     $strategyType = "RollingUpdate" }}
  {{-   end }}
  {{- end }}
  strategy:
    type: {{ $strategyType }}
  selector:
    matchLabels:
      {{- include "jarvis.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- if or .Values.podAnnotations .Values.metrics.podAnnotations }}
      annotations:
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.metrics.podAnnotations }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
        {{- end }}
      {{- end }}
      labels:
        {{- include "jarvis.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "jarvis.serviceAccountName" . }}
      {{- /* Only needed for the leader pod label PATCH (D7 in tmp/fable/multi-replica.md) — the
             ServiceAccount itself sets automountServiceAccountToken: false, so this must be
             explicit at the pod level whenever the feature is on. */}}
      automountServiceAccountToken: {{ .Values.leaderElection.podLabel.enabled }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
            failureThreshold: 3
          envFrom:
            - configMapRef:
                name: {{ include "jarvis.fullname" . }}
          env:
            - name: JARVIS_DB_DSN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret | default (include "jarvis.fullname" .) }}
                  key: {{ .Values.database.existingSecretKey }}
            {{- /* Downward API — pod identity for the leader pod label PATCH (D7).
                   Harmless when leaderElection.podLabel.enabled is false: PodLabeler
                   disables itself via the missing ServiceAccount token mount first. */}}
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            {{- if ne .Values.auth.provider "none" }}
            - name: JARVIS_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret | default (include "jarvis.fullname" .) }}
                  key: {{ .Values.auth.existingSecretKeys.secretKey }}
            {{- end }}
            {{- if eq .Values.auth.provider "oidc" }}
            - name: JARVIS_AUTH_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auth.existingSecret | default (include "jarvis.fullname" .) }}
                  key: {{ .Values.auth.existingSecretKeys.oidcClientSecret }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if .Values.serviceAccountTokenProjection.enabled }}
            - name: {{ .Values.serviceAccountTokenProjection.volumeName }}
              mountPath: {{ .Values.serviceAccountTokenProjection.mountPath }}
              readOnly: true
            {{- end }}
      volumes:
        - name: data
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "jarvis.fullname" . }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.serviceAccountTokenProjection.enabled }}
        - name: {{ .Values.serviceAccountTokenProjection.volumeName }}
          projected:
            sources:
              - serviceAccountToken:
                  path: {{ .Values.serviceAccountTokenProjection.tokenFileName }}
                  expirationSeconds: {{ .Values.serviceAccountTokenProjection.expirationSeconds }}
                  {{- if .Values.serviceAccountTokenProjection.audience }}
                  audience: {{ .Values.serviceAccountTokenProjection.audience }}
                  {{- end }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
