# Override file for compose.dev.yml — adds a test Alertmanager to the shared dev network.
# Usage:
#   podman compose -f compose.dev.yml -f compose.test-alertmanager.yml up -d
#
# Test Alertmanager is reachable:
#   - from backend container: http://test-alertmanager:9093
#   - from host (fire-test-alerts.sh): http://localhost:9094

services:
  test-alertmanager:
    image: docker.io/prom/alertmanager:latest
    container_name: jarvis_test_alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.listen-address=0.0.0.0:9093'
    ports:
      - "9094:9093"
    volumes:
      - ./scripts/test-alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro,z
    restart: unless-stopped
